<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">헬스독 평생 케어 약속 포스터</title>
  <desc id="desc">헬스독 평생 케어 약속, 건강 체크 안내, 초보 보호자 케어, 사후 상담, 지점 방문 상담을 담은 포스터 그래픽입니다.</desc>
  <defs>
    <linearGradient id="posterBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8ec"/>
      <stop offset="0.56" stop-color="#f6f0df"/>
      <stop offset="1" stop-color="#e4f6ec"/>
    </linearGradient>
    <linearGradient id="posterBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d3f46"/>
      <stop offset="1" stop-color="#18253e"/>
    </linearGradient>
    <filter id="posterShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#15243d" flood-opacity="0.16"/>
    </filter>
    <style>
      .posterTitle { font: 900 62px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #132139; letter-spacing: 0; }
      .posterSub { font: 600 26px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #3d4d5c; letter-spacing: 0; }
      .rowTitle { font: 900 34px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #132139; letter-spacing: 0; }
      .rowNote { font: 700 23px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #536573; letter-spacing: 0; }
      .chipText { font: 800 23px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #ffffff; letter-spacing: 0; }
      .strokeGreen { fill: none; stroke: #22786a; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .strokePurple { fill: none; stroke: #7f62b8; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .iconBg { fill: #e3f8ef; }
    </style>
  </defs>

  <rect width="900" height="1200" rx="44" fill="url(#posterBg)"/>
  <rect x="44" y="44" width="812" height="1112" rx="34" fill="none" stroke="#19384a" stroke-width="4" opacity="0.18"/>
  <rect x="70" y="70" width="760" height="1060" rx="28" fill="#fffdf6" opacity="0.72"/>

  <g transform="translate(102 114)">
    <text class="posterTitle" x="0" y="78">헬스독 평생</text>
    <text class="posterTitle" x="0" y="148">케어 약속</text>
    <text class="posterSub" x="0" y="211">분양 전부터 분양 후까지, 보호자와</text>
    <text class="posterSub" x="0" y="249">반려견이 안심할 수 있도록 함께합니다.</text>
  </g>

  <g transform="translate(598 120)">
    <circle cx="72" cy="72" r="72" fill="#e3f8ef"/>
    <path class="strokeGreen" d="M74 115 C44 97 32 68 47 48 C58 34 75 42 75 56 C75 42 94 34 105 48 C121 69 104 98 74 115 z"/>
    <path class="strokePurple" d="M76 57 v36 M58 75 h34"/>
  </g>

  <g transform="translate(102 410)">
    <rect width="696" height="126" rx="28" fill="#ffffff" filter="url(#posterShadow)"/>
    <circle class="iconBg" cx="72" cy="63" r="43"/>
    <path class="strokeGreen" d="M55 46 h33 v37 h-33 z"/>
    <path class="strokePurple" d="M61 58 l7 7 15-16 M61 76 h21"/>
    <text class="rowTitle" x="148" y="58">건강 체크 안내</text>
  </g>

  <g transform="translate(102 566)">
    <rect width="696" height="126" rx="28" fill="#ffffff" filter="url(#posterShadow)"/>
    <circle class="iconBg" cx="72" cy="63" r="43"/>
    <path class="strokeGreen" d="M42 67 l30-25 30 25"/>
    <path class="strokeGreen" d="M52 66 v31 h41 v-31"/>
    <path class="strokePurple" d="M66 96 v-20 h13 v20"/>
    <text class="rowTitle" x="148" y="58">초보 보호자 케어</text>
  </g>

  <g transform="translate(102 722)">
    <rect width="696" height="126" rx="28" fill="#ffffff" filter="url(#posterShadow)"/>
    <circle class="iconBg" cx="72" cy="63" r="43"/>
    <path class="strokeGreen" d="M43 50 h58 v36 h-29 l-18 17 v-17 h-11 z"/>
    <path class="strokePurple" d="M59 66 h28 M59 79 h18"/>
    <text class="rowTitle" x="148" y="58">사후 상담</text>
  </g>

  <g transform="translate(102 878)">
    <rect width="696" height="126" rx="28" fill="#ffffff" filter="url(#posterShadow)"/>
    <circle class="iconBg" cx="72" cy="63" r="43"/>
    <path class="strokeGreen" d="M72 102 C93 80 98 62 91 49 C83 34 61 34 53 49 C46 62 51 80 72 102 z"/>
    <circle cx="72" cy="58" r="10" fill="none" stroke="#7f62b8" stroke-width="8"/>
    <text class="rowTitle" x="148" y="58">지점 방문 상담</text>
  </g>

  <g transform="translate(102 1066)">
    <rect width="696" height="54" rx="27" fill="url(#posterBand)"/>
    <text class="chipText" x="348" y="36" text-anchor="middle">처음부터 건강하게</text>
  </g>
</svg>
