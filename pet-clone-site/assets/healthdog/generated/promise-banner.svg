<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620" role="img" aria-labelledby="title desc">
  <title id="title">헬스독 약속 배너</title>
  <desc id="desc">처음부터 건강하게, 실제 후기와 투명한 상담, 가까운 6개 지점을 강조하는 헬스독 3열 약속 배너입니다.</desc>
  <defs>
    <linearGradient id="bannerBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#092f36"/>
      <stop offset="0.55" stop-color="#10283c"/>
      <stop offset="1" stop-color="#151d35"/>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#49d1bd" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#49d1bd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8e72d3" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#8e72d3" stop-opacity="0"/>
    </radialGradient>
    <filter id="bannerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#00191d" flood-opacity="0.3"/>
    </filter>
    <style>
      .bannerTitle { font: 900 55px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #fffaf1; letter-spacing: 0; }
      .bannerSub { font: 600 28px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #c9dedb; letter-spacing: 0; }
      .columnTitle { font: 900 40px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #fffaf1; letter-spacing: 0; }
      .columnNote { font: 700 23px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #bad8d5; letter-spacing: 0; }
      .number { font: 900 28px "Inter", "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #0c3440; letter-spacing: 0; }
      .lineIcon { fill: none; stroke: #8ce8d7; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .lineIcon2 { fill: none; stroke: #b89af2; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1600" height="620" rx="44" fill="url(#bannerBg)"/>
  <circle cx="1260" cy="66" r="250" fill="url(#glowA)"/>
  <circle cx="188" cy="566" r="260" fill="url(#glowB)"/>
  <circle cx="1390" cy="480" r="170" fill="none" stroke="#75d9c8" stroke-width="2" opacity="0.23"/>
  <circle cx="1418" cy="480" r="116" fill="none" stroke="#75d9c8" stroke-width="2" opacity="0.17"/>
  <circle cx="228" cy="88" r="132" fill="none" stroke="#b89af2" stroke-width="2" opacity="0.16"/>
  <path d="M102 502 C254 438 374 440 522 496 C694 562 843 542 1003 467 C1131 407 1260 388 1442 426" fill="none" stroke="#7ae0cf" stroke-width="5" stroke-linecap="round" opacity="0.18"/>

  <g transform="translate(92 82)">
    <text class="bannerTitle" x="0" y="58">분양 전부터 분양 후까지, 보호자와</text>
    <text class="bannerSub" x="0" y="112">반려견이 안심할 수 있도록 함께합니다.</text>
  </g>

  <g transform="translate(90 238)" filter="url(#bannerShadow)">
    <rect width="440" height="274" rx="32" fill="#fffaf1" opacity="0.1"/>
    <circle cx="76" cy="78" r="38" fill="#8ce8d7"/>
    <text class="number" x="76" y="88" text-anchor="middle">01</text>
    <path class="lineIcon" d="M330 80 C330 56 347 42 367 42 C386 42 402 56 402 76 C402 108 367 128 330 151 C293 128 258 108 258 76 C258 56 274 42 294 42 C313 42 330 56 330 80 z"/>
    <text class="columnTitle" x="42" y="166">처음부터 건강하게</text>
  </g>

  <g transform="translate(580 238)" filter="url(#bannerShadow)">
    <rect width="440" height="274" rx="32" fill="#fffaf1" opacity="0.1"/>
    <circle cx="76" cy="78" r="38" fill="#8ce8d7"/>
    <text class="number" x="76" y="88" text-anchor="middle">02</text>
    <path class="lineIcon" d="M258 64 h112 v72 h-54 l-34 31 v-31 h-24 z"/>
    <path class="lineIcon2" d="M286 90 h52 M286 113 h34"/>
    <text class="columnTitle" x="42" y="166">실제 후기와</text>
    <text class="columnTitle" x="42" y="216">투명한 상담</text>
  </g>

  <g transform="translate(1070 238)" filter="url(#bannerShadow)">
    <rect width="440" height="274" rx="32" fill="#fffaf1" opacity="0.1"/>
    <circle cx="76" cy="78" r="38" fill="#8ce8d7"/>
    <text class="number" x="76" y="88" text-anchor="middle">03</text>
    <path class="lineIcon" d="M331 166 C371 123 384 89 368 63 C352 37 310 37 294 63 C278 89 291 123 331 166 z"/>
    <circle cx="331" cy="83" r="16" fill="none" stroke="#b89af2" stroke-width="8"/>
    <text class="columnTitle" x="42" y="166">가까운 6개 지점</text>
  </g>
</svg>
